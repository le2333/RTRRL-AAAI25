logging: "aim"
log_repo: "logs/aim/.aim"
seed: 3
env_params:
  env_name: "brax-halfcheetah"
  obs_mask: [0, 2, 4, 6, 8, 10, 12, 14, 16]
  max_ep_length: 1000
  init_kwargs:
    backend: "spring"
num_timesteps: 50000000
ppo_overrides:
  num_evals: 20
  reward_scaling: 1
  action_repeat: 1
  normalize_observations: true
  unroll_length: 20
  num_minibatches: 32
  num_updates_per_batch: 8
  discounting: 0.95
  learning_rate: 0.0001
  entropy_cost: 0.003
  clipping_epsilon: 0.2
  num_envs: 2048
  batch_size: 64

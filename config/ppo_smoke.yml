# Minimal PPO smoke config for verifying the Aim-logged baseline entrypoint.
# This is not a scientific experiment configuration.
logging: "aim"
log_repo: "logs/aim_smoke/.aim"
seed: 0
env_params:
  env_name: "brax-hopper"
  max_ep_length: 50
  init_kwargs:
    backend: "spring"
num_timesteps: 64
ppo_overrides:
  num_envs: 1
  num_eval_envs: 1
  num_evals: 1
  unroll_length: 2
  batch_size: 2
  num_minibatches: 1
  num_updates_per_batch: 1

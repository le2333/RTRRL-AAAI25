# W&B Sweep for the Brax PPO baseline (ppo_baseline.py).
#
# How it works:
# - Hyperparameters are injected by the sweep controller into wandb.config.
#   logging_util.with_logger expands dotted keys (ppo_overrides.*) into nested
#   fields and merges them into PPOParams, so they reach brax ppo.train().
# - `command` has NO ${args}: params flow only via wandb.config (simple_parsing
#   must not see --ppo_overrides.* flags). The base config (env, num_timesteps,
#   etc.) comes from /tmp/run-config.yml, injected at submit time.
# - Sweep runs log to W&B only (the sweep lives in W&B). Manual runs can still
#   use aim+wandb; add "aim" here if you also want sweep runs in the Aim repo.
#
# Create the sweep (on the jump host, after `wandb login`):
#   infra/sweep.sh create
# Launch N parallel agents on Batch (each pulls trials from the controller):
#   infra/sweep.sh launch <entity/project/sweep_id> 4 --config config/ppo_hopper_default_2m.yml

program: ppo_baseline.py
method: bayes
metric:
  name: eval/best_eval_reward
  goal: maximize

parameters:
  ppo_overrides.learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.003
  ppo_overrides.entropy_cost:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.03
  ppo_overrides.discounting:
    values: [0.97, 0.98, 0.99, 0.997]
  ppo_overrides.gae_lambda:
    values: [0.9, 0.95, 0.97]
  ppo_overrides.unroll_length:
    values: [5, 10, 20]
  ppo_overrides.num_minibatches:
    values: [8, 16, 32]
  ppo_overrides.num_updates_per_batch:
    values: [2, 4, 8]
  ppo_overrides.reward_scaling:
    values: [1, 5, 10]

command:
  - python
  - ${program}
  - --config_path
  - /tmp/run-config.yml
  - --logging
  - wandb

# Optional early stopping (uncomment to prune weak trials):
# early_terminate:
#   type: hyperband
#   min_iter: 5
